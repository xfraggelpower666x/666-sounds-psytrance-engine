name: 666 SOUNDS — Psychoacoustic Test Suite

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    name: Run Psychoacoustic Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Psychoacoustic Engine Tests
        run: npm run test:psycho

      - name: Run 4D Spatial Engine Tests
        run: npm run test:4d

      - name: Run Full Test Suite with Coverage
        run: npm test

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-node${{ matrix.node-version }}
          path: coverage/
          retention-days: 14

  badge:
    name: Test Status Summary
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Tests Passed
        if: needs.test.result == 'success'
        run: echo "✅ All psychoacoustic tests passed — Binaural, Haas, Isochronic, 4D Spatial"

      - name: Tests Failed
        if: needs.test.result == 'failure'
        run: |
          echo "❌ Test suite failed — check logs above"
          exit 1
